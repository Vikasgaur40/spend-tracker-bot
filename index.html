<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vikas — Spend Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }

  .topbar { background: #1a1a2e; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { color: #fff; font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .topbar h1 span { font-size: 22px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
  .badge-live { background: #d4edda; color: #155724; }
  .badge-err { background: #f8d7da; color: #721c24; }
  .btn { font-size: 13px; padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .btn-outline { background: rgba(255,255,255,0.12); color: #fff; }
  .btn-outline:hover { background: rgba(255,255,255,0.2); }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .controls select { font-size: 13px; padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #333; cursor: pointer; }
  .controls input { font-size: 13px; padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #333; flex: 1; min-width: 160px; }
  .btn-blue { background: #2a78d6; color: #fff; }
  .btn-blue:hover { background: #1f5fa8; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .kpi { background: #fff; border-radius: 12px; padding: 18px 20px; border: 1px solid #eee; }
  .kpi-label { font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 26px; font-weight: 700; color: #1a1a2e; }
  .kpi-sub { font-size: 12px; color: #aaa; margin-top: 4px; }

  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #eee; }
  .card-title { font-size: 13px; font-weight: 600; color: #666; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
  .chart-wrap { position: relative; width: 100%; }

  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .txn-card { background: #fff; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
  .txn-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
  .txn-header span { font-size: 13px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .txn-filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .txn-filters input, .txn-filters select { font-size: 13px; padding: 6px 10px; border-radius: 8px; border: 1px solid #ddd; background: #fafafa; color: #333; }
  .txn-list { max-height: 380px; overflow-y: auto; }
  .txn-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #f8f8f8; transition: background 0.1s; }
  .txn-row:hover { background: #fafafa; }
  .txn-row:last-child { border-bottom: none; }
  .txn-left { display: flex; align-items: center; gap: 12px; }
  .txn-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .txn-desc { font-size: 14px; color: #1a1a1a; font-weight: 500; }
  .txn-meta { font-size: 12px; color: #aaa; margin-top: 2px; }
  .txn-amount { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .empty { text-align: center; padding: 40px; color: #bbb; font-size: 14px; }
  .status-bar { text-align: center; margin-top: 16px; font-size: 12px; color: #aaa; }

  .tg-hint { background: #e8f4fd; border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; font-size: 13px; color: #1a6fa8; display: flex; align-items: center; gap: 10px; }
</style>
</head>
<body>

<div class="topbar">
  <h1><span>💰</span> Vikas Spend Tracker</h1>
  <div class="topbar-right">
    <span class="badge badge-live" id="statusBadge">connecting…</span>
    <button class="btn btn-outline" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div class="container">

  <div class="tg-hint">
    📱 Log expenses on Telegram → <strong>@vikas_spend_bot</strong> &nbsp;|&nbsp; Send: <code>210 coffee</code> &nbsp;<code>500 petrol</code> &nbsp;<code>1200 groceries</code>
  </div>

  <div class="controls">
    <select id="rangeSelect" onchange="loadData()">
      <option value="7">Last 7 days</option>
      <option value="30" selected>This month</option>
      <option value="90">Last 3 months</option>
      <option value="365">This year</option>
    </select>
    <input type="text" id="searchInput" placeholder="Search transactions…" oninput="renderTxns()">
    <select id="catFilter" onchange="renderTxns()">
      <option value="">All categories</option>
      <option value="food">Food</option>
      <option value="grocery">Grocery</option>
      <option value="transport">Transport</option>
      <option value="coffee">Coffee</option>
      <option value="shopping">Shopping</option>
      <option value="health">Health</option>
      <option value="entertainment">Entertainment</option>
      <option value="utilities">Utilities</option>
      <option value="other">Other</option>
    </select>
    <button class="btn btn-blue" onclick="loadData()">↻ Refresh</button>
  </div>

  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Total Spent</div><div class="kpi-value" id="kpiTotal">₹—</div><div class="kpi-sub" id="kpiPeriod">this month</div></div>
    <div class="kpi"><div class="kpi-label">Today</div><div class="kpi-value" id="kpiToday">₹—</div><div class="kpi-sub" id="kpiTxnCount">— transactions</div></div>
    <div class="kpi"><div class="kpi-label">Daily Average</div><div class="kpi-value" id="kpiAvg">₹—</div><div class="kpi-sub">per day</div></div>
    <div class="kpi"><div class="kpi-label">Top Category</div><div class="kpi-value" id="kpiTop" style="font-size:18px">—</div><div class="kpi-sub" id="kpiTopAmt">—</div></div>
  </div>

  <div class="charts-row">
    <div class="card">
      <div class="card-title">Daily Spend Trend</div>
      <div class="chart-wrap" style="height:220px"><canvas id="lineChart" role="img" aria-label="Daily spend trend"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">By Category</div>
      <div id="catLegend" class="legend"></div>
      <div class="chart-wrap" style="height:180px"><canvas id="pieChart" role="img" aria-label="Spend by category"></canvas></div>
    </div>
  </div>

  <div class="txn-card">
    <div class="txn-header">
      <span>Transactions</span>
      <div class="txn-filters">
        <input type="text" id="searchInput2" placeholder="Search…" oninput="renderTxns()">
        <select id="catFilter2" onchange="renderTxns()">
          <option value="">All</option>
          <option value="food">Food</option>
          <option value="grocery">Grocery</option>
          <option value="transport">Transport</option>
          <option value="coffee">Coffee</option>
          <option value="shopping">Shopping</option>
          <option value="health">Health</option>
          <option value="entertainment">Entertainment</option>
          <option value="utilities">Utilities</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>
    <div class="txn-list" id="txnList"><div class="empty">Loading…</div></div>
  </div>

  <div class="status-bar" id="statusBar">Connecting to Supabase…</div>
</div>

<script>
const SUPABASE_URL = "https://wiyjjelyoejeripncjiq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpeWpqZWx5b2VqZXJpcG5jamlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MjI0MDEsImV4cCI6MjA5ODE5ODQwMX0.FmrG4tX77h3n2vtBdyG60wgiTrd3g_Q62uBJFGEgrtI";

const CAT = {
  food:          { icon: "🍽️", color: "#2a78d6" },
  grocery:       { icon: "🛒", color: "#1baf7a" },
  transport:     { icon: "🚗", color: "#eda100" },
  coffee:        { icon: "☕", color: "#4a3aa7" },
  shopping:      { icon: "🛍️", color: "#e34948" },
  health:        { icon: "💊", color: "#eb6834" },
  entertainment: { icon: "🎬", color: "#e87ba4" },
  utilities:     { icon: "💡", color: "#008300" },
  other:         { icon: "📌", color: "#888780" },
};

let allData = [];
let lineInst = null, pieInst = null;

function fmt(n) { return "₹" + Math.round(n).toLocaleString("en-IN"); }

async function fetchData(days) {
  const from = new Date();
  from.setDate(from.getDate() - days);
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/expenses?created_at=gte.${from.toISOString()}&order=created_at.desc&limit=500`,
    { headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } }
  );
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

function updateKPIs(data, days) {
  const total = data.reduce((s, r) => s + parseFloat(r.amount), 0);
  document.getElementById("kpiTotal").textContent = fmt(total);
  const today = new Date().toISOString().split("T")[0];
  const todayTotal = data.filter(r => r.created_at.startsWith(today)).reduce((s,r) => s + parseFloat(r.amount), 0);
  document.getElementById("kpiToday").textContent = fmt(todayTotal);
  document.getElementById("kpiTxnCount").textContent = `${data.length} transactions`;
  document.getElementById("kpiAvg").textContent = fmt(total / Math.max(days, 1));
  const catTotals = {};
  for (const r of data) catTotals[r.category] = (catTotals[r.category] || 0) + parseFloat(r.amount);
  const top = Object.entries(catTotals).sort((a,b) => b[1]-a[1])[0];
  if (top) {
    document.getElementById("kpiTop").textContent = (CAT[top[0]]||CAT.other).icon + " " + top[0];
    document.getElementById("kpiTopAmt").textContent = fmt(top[1]);
  }
}

function updateLineChart(data) {
  const byDay = {};
  for (const r of data) { const d = r.created_at.split("T")[0]; byDay[d] = (byDay[d]||0) + parseFloat(r.amount); }
  const sorted = Object.entries(byDay).sort((a,b) => a[0].localeCompare(b[0]));
  const labels = sorted.map(([d]) => new Date(d).toLocaleDateString("en-IN", { day:"numeric", month:"short" }));
  const values = sorted.map(([,v]) => Math.round(v));
  if (lineInst) lineInst.destroy();
  lineInst = new Chart(document.getElementById("lineChart").getContext("2d"), {
    type: "line",
    data: { labels, datasets: [{ data: values, borderColor: "#2a78d6", backgroundColor: "rgba(42,120,214,0.08)", borderWidth: 2, pointRadius: values.length > 20 ? 0 : 4, pointBackgroundColor: "#2a78d6", tension: 0.3, fill: true }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fmt(c.raw) } } }, scales: { x: { ticks: { font: { size: 11 }, maxTicksLimit: 8 }, grid: { display: false } }, y: { ticks: { font: { size: 11 }, callback: v => "₹" + v.toLocaleString("en-IN") }, grid: { color: "rgba(0,0,0,0.04)" } } } }
  });
}

function updatePieChart(data) {
  const catTotals = {};
  for (const r of data) catTotals[r.category] = (catTotals[r.category]||0) + parseFloat(r.amount);
  const entries = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
  const labels = entries.map(([k]) => k);
  const values = entries.map(([,v]) => Math.round(v));
  const colors = labels.map(k => (CAT[k]||CAT.other).color);
  const total = values.reduce((s,v) => s+v, 0);
  document.getElementById("catLegend").innerHTML = labels.map((k,i) =>
    `<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${(CAT[k]||CAT.other).icon} ${k} ${Math.round(values[i]/total*100)}%</span>`
  ).join("");
  if (pieInst) pieInst.destroy();
  pieInst = new Chart(document.getElementById("pieChart").getContext("2d"), {
    type: "doughnut",
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: "#fff" }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `${c.label}: ${fmt(c.raw)}` } } } }
  });
}

function renderTxns() {
  const search = (document.getElementById("searchInput").value || document.getElementById("searchInput2").value).toLowerCase();
  const cat = document.getElementById("catFilter").value || document.getElementById("catFilter2").value;
  const filtered = allData.filter(r => {
    const ms = !search || r.description.toLowerCase().includes(search) || r.category.includes(search);
    const mc = !cat || r.category === cat;
    return ms && mc;
  });
  const list = document.getElementById("txnList");
  if (!filtered.length) { list.innerHTML = '<div class="empty">No transactions found</div>'; return; }
  list.innerHTML = filtered.slice(0, 100).map(r => {
    const cfg = CAT[r.category] || CAT.other;
    const dt = new Date(r.created_at);
    const ds = dt.toLocaleDateString("en-IN", { day:"numeric", month:"short" }) + " " + dt.toLocaleTimeString("en-IN", { hour:"2-digit", minute:"2-digit" });
    return `<div class="txn-row">
      <div class="txn-left">
        <div class="txn-icon" style="background:${cfg.color}22">${cfg.icon}</div>
        <div><div class="txn-desc">${r.description}</div><div class="txn-meta">${r.category} · ${ds}</div></div>
      </div>
      <div class="txn-amount">${fmt(r.amount)}</div>
    </div>`;
  }).join("");
}

async function loadData() {
  const days = parseInt(document.getElementById("rangeSelect").value);
  document.getElementById("statusBar").textContent = "Fetching data…";
  try {
    allData = await fetchData(days);
    document.getElementById("statusBadge").textContent = "● live";
    document.getElementById("statusBadge").className = "badge badge-live";
    updateKPIs(allData, days);
    updateLineChart(allData);
    updatePieChart(allData);
    renderTxns();
    document.getElementById("statusBar").textContent = `${allData.length} transactions · Last updated ${new Date().toLocaleTimeString("en-IN")}`;
  } catch(e) {
    document.getElementById("statusBadge").textContent = "● error";
    document.getElementById("statusBadge").className = "badge badge-err";
    document.getElementById("statusBar").textContent = "Error: " + e.message;
    document.getElementById("txnList").innerHTML = '<div class="empty">Could not load data.</div>';
  }
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
